<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Game</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

 
<section class="game-main-section">
  <div id="canvas-container">
     <!-- canvas -->
    <canvas id="" width="360" height="640"></canvas>
    
    <div class="heading knockout">
      <h1>ELIGE TU AVATAR</h1>
    </div>

    <div class="player-selector">
      <div class="image-container" data-duck-number="1">
        <img src="/imgs/players/pato-1.png" class="pato-1" alt="desalia-duck-1">
      </div>
      <div class="image-container" data-duck-number="2">
        <img src="/imgs/players/pato-2.png" class="pato-2" alt="desalia-duck-2">
      </div>
      <div class="image-container" data-duck-number="3">
        <img src="/imgs/players/pato-3.png" class="pato-3" alt="desalia-duck-3">
      </div>
      <div class="image-container" data-duck-number="4">
        <img src="/imgs/players/pato-4.png" class="pato-4" alt="desalia-duck-4">
      </div>
      <div class="image-container" data-duck-number="5">
        <img src="/imgs/players/pato-5.png" class="pato-5" alt="desalia-duck-5">
      </div>
    </div>
   

    <!-- start btn -->
    <a href="#" class="OSD-mono" id="startBtn">
      START GAME
    </a>

    <!-- image background  -->
    <div id="poster" alt="poster"></div>
  </div>
</section>

  <script type="module" src="/index.js"></script>
 

</body>
</html>
